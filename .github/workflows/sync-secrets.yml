name: Sync Secrets

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    name: Sync GitHub Secrets → GCP Secret Manager & Cloudflare Workers
    runs-on: ubuntu-latest
    env:
      # Map of runtime secret names — populate these in GH Secrets if you want them synced
      PCO_TOKEN_ID: ${{ secrets.PCO_TOKEN_ID || '' }}
      PCO_TOKEN_SECRET: ${{ secrets.PCO_TOKEN_SECRET || '' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
      INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN || '' }}
      FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY || '' }}
      ONECLICK_SECRET: ${{ secrets.ONECLICK_SECRET || '' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM || '' }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || '' }}
      DEV_AUTH_SECRET: ${{ secrets.DEV_AUTH_SECRET || '' }}
      # Deployment credential for Cloudflare
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (for wrangler)
        run: npm ci --no-audit --no-fund

      - name: Push secrets to Cloudflare Workers (wrangler)
        if: ${{ env.CF_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          names=(PCO_TOKEN_ID PCO_TOKEN_SECRET RESEND_API_KEY INFOMANIAK_TOKEN FCM_SERVER_KEY ONECLICK_SECRET EMAIL_FROM FIREBASE_PROJECT_ID DEV_AUTH_SECRET)
          for n in "${names[@]}"; do
            val="${!n}"
            if [[ -z "$val" ]]; then
              echo "Skipping $n for Cloudflare (not set)"
              continue
            fi
            echo "Setting Cloudflare secret: $n"
            # Use npx wrangler to put the secret; relies on wrangler.toml to identify the worker
            printf '%s' "$val" | npx wrangler secret put "$n"
          done

      - name: Done
        run: echo "Secrets sync completed. Verify your deployments and logs."
